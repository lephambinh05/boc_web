name: jun_sudoku
description: "Jun Sudoku - Trò chơi giải đố thông minh Việt Nam"
publish_to: "none"
version: 2.0.1+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1

  # WebView
  webview_flutter: ^4.7.0
  webview_flutter_android: ^4.10.1
  webview_flutter_wkwebview: ^3.13.0

  # Tiện ích
  url_launcher: ^6.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # --- THÊM DÒNG NÀY ---
  audioplayers: ^6.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # --- THÊM DÒNG NÀY (Nhớ tạo đúng thư mục) ---
    - assets/sound-effects/
    - assets/images/puzzles/

# CẤU HÌNH TẠO ICON TỰ ĐỘNG (Giữ nguyên)
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "AppIcons/playstore.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "AppIcons/playstore.png"

# CẤU HÌNH NATIVE SPLASH SCREEN
flutter_native_splash:
  color: "#0a2d37"
  background_image: "assets/images/sudoku_bg.png"
  image: "AppIcons/playstore.png"
  android_12:
    image: "AppIcons/playstore.png"
    icon_background_color: "#0a2d37"

